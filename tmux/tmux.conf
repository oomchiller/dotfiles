#
# Reload
#
unbind r
bind r source-file ~/.tmux.conf

#
# Terminal and session behavior
#
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",$TERM*:RGB"
set -s set-clipboard on
set -sg escape-time 10
set -g focus-events on
set -g history-limit 100000000
set -g base-index 1
set -g pane-base-index 1
set -g repeat-time 500
set-window-option -g mode-keys vi
set -g set-titles on
set -g set-titles-string '#{user}@#h: #S [tmux]'

#
# Status bar
#
set -g status-position top
set -g status-justify absolute-centre
set -g window-status-separator ""
set -g bell-action any
set -g monitor-bell on
set -g window-status-bell-style fg=#cdd6f4,bold,bg=#181825

set -g status-style fg=#cdd6f4,bold,bg=#11111b
set -g message-command-style fg=#cdd6f4,bold,bg=#11111b
set -g message-style fg=#cdd6f4,bold,bg=#11111b

# Inactive tab
set -g window-status-style fg=#6c7086,bg=#181825
set -g window-status-format "    #I #W#{?window_bell_flag, ,}    "

# Active tab
set -g window-status-current-style fg=#cdd6f4,bg=#313244,bold
set -g window-status-current-format "    #I #W#{?window_bell_flag, ,}    "

# Status panels
set -g status-left-length "250"
set -g status-left-style fg=#cdd6f4,bg=#11111b
set -g status-left ""

set -g status-right-length "250"
set -g status-right-style fg=#cdd6f4,bg=#11111b
set -g status-right ""

#
# Pane and popup styling
#
set -g pane-border-lines heavy
set -g pane-border-status off
set -g pane-border-format ""
set -g pane-border-style fg=#6c7086,bg=#1e1e2e
set -g pane-active-border-style fg=#cdd6f4,bg=#1e1e2e

set -g popup-border-lines heavy
set -g menu-border-lines heavy

set -g mode-style fg=#cdd6f4,bg=#45475a,bold

#
# Window management
#
unbind s
unbind -n MouseDown3Pane

unbind q
bind q detach-client

unbind e
bind e choose-tree -sZ

unbind t
bind t new-window # new tab

unbind W
bind W kill-window # close tab

unbind [
bind -r [ previous-window

unbind ]
bind -r ] next-window

unbind \{
bind -r \{ swap-window -d -t -1 # move tab left

unbind \}
bind -r \} swap-window -d -t +1 # move tab right

#
# Pane management
#
unbind w
bind w kill-pane # close pane

unbind d
bind d split-window -h

unbind D
bind D split-window -v

unbind h
bind -r h select-pane -L # split - go to left

unbind j
bind -r j select-pane -D # split - go to down

unbind k
bind -r k select-pane -U # split - go to up

unbind l
bind -r l select-pane -R # split - go to right

unbind H
bind -r H resize-pane -L 10 # resize split left

unbind J
bind -r J resize-pane -D 10 # resize split down

unbind K
bind -r K resize-pane -U 10 # resize split up

unbind L
bind -r L resize-pane -R 10 # resize split right

unbind f
bind -r f resize-pane -Z

unbind ,
bind -r , swap-pane -U

unbind .
bind -r . swap-pane -D

#
# Screen cleanup
#
bind -n M-l send-keys C-l \; send-keys -R \; clear-history
bind -n M-д send-keys C-l \; send-keys -R \; clear-history

#
# Copy mode
#
unbind v
bind v copy-mode

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-selection-and-cancel
