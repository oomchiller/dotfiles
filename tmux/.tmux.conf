#
# Reload
#
unbind r
bind r source-file ~/.tmux.conf

#
# Terminal and session behavior
#
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",$TERM*:RGB"
set -s set-clipboard on
set -sg escape-time 10
set -g focus-events on
set -g history-limit 100000000
set -g base-index 1
set -g pane-base-index 1
set -g repeat-time 500
set-window-option -g mode-keys vi
set -g set-titles on
set -g set-titles-string '#{user}@#h: #S [tmux]'

#
# Status bar
#
set -g status-position top
set -g status-justify absolute-centre
set -g window-status-separator ""
set -g bell-action any
set -g monitor-bell on
set -g window-status-bell-style fg=#161821,bg=#ff9b5e,bold

# Monokai Pro Ristretto
# dark2="#161821"
# dark1="#1e1f2b"
# background="#282a3a"
# text="#eaf2f1"
# accent1="#ff657a"
# accent2="#ff9b5e"
# accent3="#ffd76d"
# accent4="#bad761"
# accent5="#9cd1bb"
# accent6="#c39ac9"
# dimmed1="#b2b9bd"
# dimmed2="#888d94"
# dimmed3="#696d77"
# dimmed4="#535763"
# dimmed5="#3a3d4b"

set -g status-style fg=#eaf2f1,bg=#161821
set -g message-command-style fg=#161821,bg=#c39ac9,bold
set -g message-style fg=#161821,bg=#ffd76d,bold

# Inactive tab
set -g window-status-style fg=#888d94,bg=#1e1f2b
set -g window-status-format "#[fg=#696d77,bg=#1e1f2b]  #I #[fg=#888d94,bg=#1e1f2b]#W#{?window_bell_flag, #[fg=#ff9b5e]#[fg=#888d94],}  "

# Active tab
set -g window-status-current-style fg=#eaf2f1,bg=#3a3d4b,bold
set -g window-status-current-format "#[fg=#ffd76d,bg=#3a3d4b,bold]  #I #[fg=#eaf2f1,bg=#3a3d4b]#W#{?window_bell_flag, #[fg=#ff9b5e]#[fg=#eaf2f1],}  "

# Status panels
set -g status-left-length "250"
set -g status-left-style fg=#eaf2f1,bg=#161821
set -g status-left "#[fg=#ffd76d,bg=#161821,bold] #S #[fg=#535763,bg=#161821]|#[fg=#b2b9bd,bg=#161821] #h "

set -g status-right-length "250"
set -g status-right-style fg=#eaf2f1,bg=#161821
set -g status-right "#[fg=#888d94,bg=#161821]#{?client_prefix, PREFIX ,}#[fg=#535763,bg=#161821]|#[fg=#ffd76d,bg=#161821,bold] %Y-%m-%d #[fg=#ff9b5e,bg=#161821,bold]%H:%M "

#
# Pane and popup styling
#
set -g pane-border-lines heavy
set -g pane-border-status off
set -g pane-border-format ""
set -g pane-border-style fg=#535763,bg=#1e1f2b
set -g pane-active-border-style fg=#ff9b5e,bg=#1e1f2b

set -g popup-border-lines heavy
set -g menu-border-lines heavy
set -g popup-style fg=#eaf2f1,bg=#1e1f2b
set -g popup-border-style fg=#ff9b5e,bg=#1e1f2b
set -g menu-style fg=#eaf2f1,bg=#1e1f2b
set -g menu-border-style fg=#ff9b5e,bg=#1e1f2b
set -g menu-selected-style fg=#161821,bg=#ffd76d,bold

set -g mode-style fg=#161821,bg=#ffd76d,bold

#
# Window management
#
unbind s
unbind -n MouseDown3Pane

unbind q
bind q detach-client

unbind e
bind e choose-tree -sZ

unbind t
bind t new-window # new tab

unbind W
bind W kill-window # close tab

unbind [
bind -r [ previous-window

unbind ]
bind -r ] next-window

unbind \{
bind -r \{ swap-window -d -t -1 # move tab left

unbind \}
bind -r \} swap-window -d -t +1 # move tab right

#
# Pane management
#
unbind w
bind w kill-pane # close pane

unbind d
bind d split-window -h

unbind D
bind D split-window -v

unbind h
bind -r h select-pane -L # split - go to left

unbind j
bind -r j select-pane -D # split - go to down

unbind k
bind -r k select-pane -U # split - go to up

unbind l
bind -r l select-pane -R # split - go to right

unbind H
bind -r H resize-pane -L 10 # resize split left

unbind J
bind -r J resize-pane -D 10 # resize split down

unbind K
bind -r K resize-pane -U 10 # resize split up

unbind L
bind -r L resize-pane -R 10 # resize split right

unbind f
bind -r f resize-pane -Z

unbind ,
bind -r , swap-pane -U

unbind .
bind -r . swap-pane -D

#
# Screen cleanup
#
bind -n M-l send-keys C-l \; send-keys -R \; clear-history
bind -n M-д send-keys C-l \; send-keys -R \; clear-history

#
# Copy mode
#
unbind v
bind v copy-mode

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-selection-and-cancel
