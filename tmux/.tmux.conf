#
# Reload
#
unbind r
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

#
# Terminal and session behavior
#
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -s set-clipboard on
set -sg escape-time 10
set -g focus-events on
set -g history-limit 200000
set -g base-index 1
set -g pane-base-index 1
set -g repeat-time 1000
set-window-option -g mode-keys vi
set -g set-titles on
set -g set-titles-string '#{user}@#h: #S [tmux]'

#
# Status bar
#
set -g status-position top
set -g status-justify absolute-centre
set -g window-status-separator ""
set -g bell-action any
set -g monitor-bell on
set -g window-status-bell-style default

set -g status-style fg=colour7,bg=default
set -g message-command-style fg=colour0,bg=colour5,bold
set -g message-style fg=colour0,bg=colour3,bold

# Inactive tab
set -g window-status-style fg=colour8,bg=default
set -g window-status-format "#[fg=colour8,bg=default]  #I #W#{?window_bell_flag, #[fg=colour3,bold]#[fg=colour8,nobold],}  "

# Active tab
set -g window-status-current-style fg=colour4,bg=default,bold
set -g window-status-current-format "#[fg=colour4,bg=default,bold]  #I #W#{?window_bell_flag, #[fg=colour3,bold]#[fg=colour4,bold],}  "

# Status panels
set -g status-left-length "250"
set -g status-left-style fg=colour7,bg=default
set -g status-left "#[fg=colour3,bold] #S #[fg=colour8,nobold]|#[fg=colour7] #h "

set -g status-right-length "250"
set -g status-right-style fg=colour7,bg=default
set -g status-right "#[fg=colour5,bold]#{?client_prefix, PREFIX ,}#[fg=colour8,nobold]| #[fg=colour3,bold]%Y-%m-%d #[fg=colour4,bold]%H:%M "

#
# Pane and popup styling
#
set -g pane-border-lines heavy
set -g pane-border-status off
set -g pane-border-format ""
set -g pane-border-style fg=colour8,bg=default
set -g pane-active-border-style fg=colour4,bg=default,bold

set -g popup-border-lines heavy
set -g menu-border-lines heavy
set -g popup-style fg=colour7,bg=default
set -g popup-border-style fg=colour4,bg=default,bold
set -g menu-style fg=colour7,bg=default
set -g menu-border-style fg=colour4,bg=default,bold
set -g menu-selected-style fg=colour0,bg=colour7,bold

set -g mode-style fg=colour0,bg=colour7,bold

#
# Window management
#
unbind s
unbind -n MouseDown3Pane

unbind q
bind q detach-client

unbind e
bind e choose-tree -sZ

unbind t
bind t new-window # new tab

unbind W
bind W kill-window # close tab

unbind [
bind -r [ previous-window

unbind ]
bind -r ] next-window

unbind 1
bind -r 1 select-window -t :=1

unbind 2
bind -r 2 select-window -t :=2

unbind 3
bind -r 3 select-window -t :=3

unbind 4
bind -r 4 select-window -t :=4

unbind 5
bind -r 5 select-window -t :=5

unbind 6
bind -r 6 select-window -t :=6

unbind 7
bind -r 7 select-window -t :=7

unbind 8
bind -r 8 select-window -t :=8

unbind 9
bind -r 9 select-window -t :=9

unbind \{
bind -r \{ swap-window -d -t -1 # move tab left

unbind \}
bind -r \} swap-window -d -t +1 # move tab right

#
# Pane management
#
unbind w
bind w kill-pane # close pane

unbind d
bind d split-window -h

unbind D
bind D split-window -v

unbind h
bind -r h select-pane -L # split - go to left

unbind j
bind -r j select-pane -D # split - go to down

unbind k
bind -r k select-pane -U # split - go to up

unbind l
bind -r l select-pane -R # split - go to right

unbind H
bind -r H resize-pane -L 4 # resize split left

unbind J
bind -r J resize-pane -D 4 # resize split down

unbind K
bind -r K resize-pane -U 4 # resize split up

unbind L
bind -r L resize-pane -R 4 # resize split right

unbind Left
bind -r Left select-pane -L

unbind Down
bind -r Down select-pane -D

unbind Up
bind -r Up select-pane -U

unbind Right
bind -r Right select-pane -R

unbind S-Left
bind -r S-Left resize-pane -L 10

unbind S-Down
bind -r S-Down resize-pane -D 10

unbind S-Up
bind -r S-Up resize-pane -U 10

unbind S-Right
bind -r S-Right resize-pane -R 10

unbind f
bind -r f resize-pane -Z

unbind ,
bind -r , swap-pane -U

unbind .
bind -r . swap-pane -D

#
# Screen cleanup
#
bind C-l send-keys C-l \; send-keys -R \; clear-history

#
# Copy mode
#
unbind v
bind v copy-mode

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-selection-and-cancel
